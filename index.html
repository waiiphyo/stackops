<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="StackOps is a founder-led IT consulting agency for resilient cloud, DevOps, security, and managed operations."
    />
    <link rel="icon" type="image/svg+xml" href="/logos/StackOps_mark.svg" />
    <script>
      (function () {
        try {
          var theme = localStorage.getItem('stackops-theme') === 'light' ? 'light' : 'dark';
          document.documentElement.dataset.theme = theme;
        } catch {
          document.documentElement.dataset.theme = 'dark';
        }
      })();
    </script>
    <title>StackOps IT Consulting</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
